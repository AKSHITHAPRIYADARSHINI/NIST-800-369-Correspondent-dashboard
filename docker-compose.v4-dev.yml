services:
  v4-dashboard-dev:
    image: node:20-bookworm
    container_name: v4-dashboard-dev
    working_dir: /workspace
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:4000
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
      - v4_node_modules:/workspace/node_modules
      - v4_apps_node_modules:/workspace/apps/v4/node_modules
      - v4_packages_shadcn_node_modules:/workspace/packages/shadcn/node_modules
    command: >
      bash -lc "
      corepack enable &&
      pnpm install &&
      pnpm --filter=shadcn build &&
      cd apps/v4 &&
      pnpm exec next dev --turbopack --hostname 0.0.0.0 --port 4000
      "

volumes:
  v4_node_modules:
  v4_apps_node_modules:
  v4_packages_shadcn_node_modules:
